# nginx reverse-proxy config for Tibia Monitor Backend
#
# INSTALL:
#   sudo cp tibia-monitor.conf /etc/nginx/sites-available/tibia-monitor
#   sudo ln -s /etc/nginx/sites-available/tibia-monitor /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# REQUIREMENTS:
#   - certbot already ran for your domain:
#       certbot --nginx -d your-domain.com
#   - Node backend running on localhost:3000 (npm start in /root/TibiaOTmonitor/backend)

# Replace every occurrence of "your-domain.com" with your actual domain.

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    server_name your-domain.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — SSL termination + proxy to Node backend
server {
    listen 443 ssl;
    server_name your-domain.com;

    # Certbot-managed certificates
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # REST API
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO — needs connection upgrade
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;

        # Keep long-lived websocket connections alive
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
