name: Build iOS IPA

# Required repository secrets:
#   APP_STORE_CONNECT_API_KEY_ID      — Key ID from App Store Connect (e.g. ABC1234567)
#   APP_STORE_CONNECT_API_ISSUER_ID   — Issuer ID from App Store Connect (UUID format)
#   APP_STORE_CONNECT_API_KEY_BASE64  — base64-encoded .p8 private key file
#   APPLE_TEAM_ID                     — 10-character Apple Developer Team ID

on:
  push:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      # --no-install skips running `pod install` automatically so we can
      # restore the Pods cache before paying the pod install cost.
      - name: Run Expo prebuild
        working-directory: mobile
        run: npx expo prebuild --platform ios --no-install

      # expo prebuild injects CODE_SIGN_IDENTITY[sdk=iphoneos*] = "iPhone Developer"
      # which conflicts with Automatic distribution signing — remove it so Xcode
      # can freely pick the Distribution certificate.
      - name: Patch Xcode signing for distribution
        run: |
          PBXPROJ="mobile/ios/TibiaOTMonitor.xcodeproj/project.pbxproj"
          sed -i '' '/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]"/d' "$PBXPROJ"
          echo "Patched: removed conflicting CODE_SIGN_IDENTITY from pbxproj"

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: mobile/ios/Pods
          key: pods-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: pods-

      - name: Install CocoaPods dependencies
        working-directory: mobile/ios
        run: pod install

      # ── API Key setup ──────────────────────────────────────────────────────────

      - name: Check API key secret
        id: signing
        env:
          API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          if [ -n "$API_KEY_B64" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      # Writes the .p8 key to a temp file so xcodebuild can authenticate
      # against App Store Connect for both provisioning and upload.
      - name: Setup App Store Connect API key
        if: steps.signing.outputs.available == 'true'
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          echo "API_KEY_PATH=$API_KEY_PATH" >> $GITHUB_ENV

      # ── Xcode workspace / scheme detection ───────────────────────────────────

      - name: Detect Xcode workspace and scheme
        id: xcode
        working-directory: mobile/ios
        run: |
          WORKSPACE=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "ERROR: No .xcworkspace found in mobile/ios/" >&2
            exit 1
          fi
          SCHEME="${WORKSPACE%.xcworkspace}"
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME"       >> $GITHUB_OUTPUT
          echo "Detected workspace: $WORKSPACE  scheme: $SCHEME"

      # ── Archive ───────────────────────────────────────────────────────────────

      # Mirrors the local build-ios-testflight.sh: uses Automatic signing +
      # -allowProvisioningUpdates so xcodebuild fetches/creates profiles itself
      # via the API key — no manual certificate or profile secrets needed.
      - name: Archive (signed release)
        if: steps.signing.outputs.available == 'true'
        working-directory: mobile/ios
        run: |
          xcodebuild archive \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme    "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ env.API_KEY_PATH }}" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"

      # ── Export IPA ────────────────────────────────────────────────────────────

      # On pull requests: export to a local IPA only (no upload).
      # On push to main/master: destination=upload sends directly to TestFlight,
      # authenticated via the API key — no APPLE_ID or app-specific password needed.
      - name: Export IPA (pull request — no upload)
        if: >
          steps.signing.outputs.available == 'true' &&
          github.event_name != 'push'
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath        "$RUNNER_TEMP/app.xcarchive" \
            -exportPath         "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ env.API_KEY_PATH }}" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"

      - name: Export and upload to TestFlight (push to main)
        if: >
          steps.signing.outputs.available == 'true' &&
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath        "$RUNNER_TEMP/app.xcarchive" \
            -exportPath         "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ env.API_KEY_PATH }}" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"

      # ── Unsigned simulator build (fallback when secrets are absent) ───────────

      - name: Build for simulator (unsigned)
        if: steps.signing.outputs.available == 'false'
        working-directory: mobile/ios
        run: |
          echo "::warning::APP_STORE_CONNECT_API_KEY_BASE64 not configured — building for simulator only (no IPA produced)"
          xcodebuild build \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme    "${{ steps.xcode.outputs.scheme }}" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES

      # ── Artifact upload ───────────────────────────────────────────────────────

      - name: Upload IPA artifact
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tibia-ot-monitor-ios-${{ github.run_number }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 14

      - name: Upload simulator build artifact
        if: steps.signing.outputs.available == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: tibia-ot-monitor-ios-simulator-${{ github.run_number }}
          path: ${{ runner.temp }}/DerivedData/Build/Products/Debug-iphonesimulator/*.app
          retention-days: 14
