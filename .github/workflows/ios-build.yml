name: Build iOS IPA

# Required repository secrets:
#   APP_STORE_CONNECT_API_KEY_ID      — Key ID from App Store Connect (e.g. ABC1234567)
#   APP_STORE_CONNECT_API_ISSUER_ID   — Issuer ID from App Store Connect (UUID format)
#   APP_STORE_CONNECT_API_KEY_BASE64  — base64-encoded .p8 private key file
#   APPLE_TEAM_ID                     — 10-character Apple Developer Team ID
#   IOS_DIST_CERT_BASE64              — base64-encoded .p12 distribution certificate
#   IOS_DIST_CERT_PASSWORD            — password for the .p12 certificate
#   IOS_PROVISIONING_PROFILE_BASE64   — base64-encoded .mobileprovision file

on:
  push:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      - name: Run Expo prebuild
        working-directory: mobile
        run: npx expo prebuild --platform ios --no-install

      - name: Patch Xcode signing for distribution
        run: |
          PBXPROJ="mobile/ios/TibiaOTMonitor.xcodeproj/project.pbxproj"
          sed -i '' '/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]"/d' "$PBXPROJ"
          echo "Patched: removed conflicting CODE_SIGN_IDENTITY from pbxproj"

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: mobile/ios/Pods
          key: pods-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: pods-

      - name: Install CocoaPods dependencies
        working-directory: mobile/ios
        run: pod install

      # ── Check which secrets are available ────────────────────────────────────

      - name: Check available secrets
        id: signing
        env:
          API_KEY_B64:   ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          DIST_CERT_B64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          PROV_PROF_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -n "$API_KEY_B64" ] && [ -n "$DIST_CERT_B64" ] && [ -n "$PROV_PROF_B64" ]; then
            echo "mode=manual" >> $GITHUB_OUTPUT
          elif [ -n "$API_KEY_B64" ]; then
            echo "mode=automatic" >> $GITHUB_OUTPUT
          else
            echo "mode=none" >> $GITHUB_OUTPUT
          fi

      # ── API Key setup (always needed when available) ──────────────────────────

      - name: Setup App Store Connect API key
        if: steps.signing.outputs.mode != 'none'
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          echo "API_KEY_PATH=$API_KEY_PATH" >> $GITHUB_ENV

      # ── Manual signing: install certificate + provisioning profile ────────────
      # This is the most reliable approach for CI — no dependency on cloud signing.

      - name: Install distribution certificate
        if: steps.signing.outputs.mode == 'manual'
        env:
          DIST_CERT_B64:  ${{ secrets.IOS_DIST_CERT_BASE64 }}
          DIST_CERT_PASS: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/dist.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASS="temporary-keychain-password"

          echo "$DIST_CERT_B64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$DIST_CERT_PASS" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Grant codesign access to the keychain — required on macOS 10.12+
          # Without this, codesign silently fails even with the cert imported.
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASS=$KEYCHAIN_PASS" >> $GITHUB_ENV

      - name: Install provisioning profile
        if: steps.signing.outputs.mode == 'manual'
        env:
          PROV_PROF_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$PROV_PROF_B64" | base64 --decode > "$PP_PATH"

          # Install into the system profiles directory Xcode reads
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision

          echo "PROVISIONING_PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "Installed profile UUID: $UUID"

      # ── Detect workspace / scheme ─────────────────────────────────────────────

      - name: Detect Xcode workspace and scheme
        id: xcode
        working-directory: mobile/ios
        run: |
          WORKSPACE=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "ERROR: No .xcworkspace found in mobile/ios/" >&2
            exit 1
          fi
          SCHEME="${WORKSPACE%.xcworkspace}"
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME"       >> $GITHUB_OUTPUT
          echo "Detected workspace: $WORKSPACE  scheme: $SCHEME"

      # ── Archive — manual signing ──────────────────────────────────────────────

      - name: Archive (manual signing)
        if: steps.signing.outputs.mode == 'manual'
        working-directory: mobile/ios
        run: |
          xcodebuild archive \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme    "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            PROVISIONING_PROFILE="${{ env.PROVISIONING_PROFILE_UUID }}" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${{ env.KEYCHAIN_PATH }}"

      # ── Archive — automatic signing (API key only, no cert/profile secrets) ───

      - name: Archive (automatic signing)
        if: steps.signing.outputs.mode == 'automatic'
        working-directory: mobile/ios
        run: |
          xcodebuild archive \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme    "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath      "${{ env.API_KEY_PATH }}" \
            -authenticationKeyID        "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID  "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"

      # ── Export IPA ────────────────────────────────────────────────────────────

      - name: Export IPA (pull request — no upload)
        if: >
          steps.signing.outputs.mode != 'none' &&
          github.event_name != 'push'
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>${{ steps.signing.outputs.mode }}</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath        "$RUNNER_TEMP/app.xcarchive" \
            -exportPath         "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath      "${{ env.API_KEY_PATH }}" \
            -authenticationKeyID        "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID  "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"

      - name: Export and upload to TestFlight (push to main)
        if: >
          steps.signing.outputs.mode != 'none' &&
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>${{ steps.signing.outputs.mode }}</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath        "$RUNNER_TEMP/app.xcarchive" \
            -exportPath         "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath      "${{ env.API_KEY_PATH }}" \
            -authenticationKeyID        "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID  "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"

      # ── Unsigned simulator build (fallback when no secrets) ───────────────────

      - name: Build for simulator (unsigned)
        if: steps.signing.outputs.mode == 'none'
        working-directory: mobile/ios
        run: |
          echo "::warning::No signing secrets configured — building for simulator only (no IPA produced)"
          xcodebuild build \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme    "${{ steps.xcode.outputs.scheme }}" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES

      # ── Cleanup keychain ──────────────────────────────────────────────────────

      - name: Cleanup keychain
        if: steps.signing.outputs.mode == 'manual' && always()
        run: security delete-keychain "$KEYCHAIN_PATH" || true

      # ── Artifact upload ───────────────────────────────────────────────────────

      - name: Upload IPA artifact
        if: steps.signing.outputs.mode != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: tibia-ot-monitor-ios-${{ github.run_number }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 14

      - name: Upload simulator build artifact
        if: steps.signing.outputs.mode == 'none'
        uses: actions/upload-artifact@v4
        with:
          name: tibia-ot-monitor-ios-simulator-${{ github.run_number }}
          path: ${{ runner.temp }}/DerivedData/Build/Products/Debug-iphonesimulator/*.app
          retention-days: 14
