name: Build iOS IPA

# Required repository secrets:
#   IOS_CERTIFICATE_BASE64          — base64-encoded Apple Distribution .p12 certificate
#   IOS_CERTIFICATE_PASSWORD        — password used to export/encrypt the .p12
#   IOS_PROVISIONING_PROFILE_BASE64 — base64-encoded App Store Distribution .mobileprovision
#   IOS_PROVISIONING_PROFILE_UUID   — UUID of that provisioning profile
#   APPLE_TEAM_ID                   — 10-character Apple Developer Team ID (W449469S62)
#   APPLE_ID                        — Apple ID email (for TestFlight upload, push to main only)
#   APPLE_APP_SPECIFIC_PASSWORD     — App-specific password from appleid.apple.com

on:
  push:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      # --no-install skips running `pod install` automatically so we can
      # restore the Pods cache before paying the pod install cost.
      - name: Run Expo prebuild
        working-directory: mobile
        run: npx expo prebuild --platform ios --no-install

      # expo prebuild injects CODE_SIGN_IDENTITY[sdk=iphoneos*] = "iPhone Developer"
      # which conflicts with Distribution signing — remove it so our CI overrides win.
      - name: Patch Xcode signing for distribution
        run: |
          PBXPROJ="mobile/ios/TibiaOTMonitor.xcodeproj/project.pbxproj"
          sed -i '' '/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]"/d' "$PBXPROJ"
          echo "Patched: removed conflicting CODE_SIGN_IDENTITY from pbxproj"

      # Cache is keyed on package-lock.json because that file determines
      # which native modules (and therefore which pods) are installed.
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: mobile/ios/Pods
          key: pods-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: pods-

      - name: Install CocoaPods dependencies
        working-directory: mobile/ios
        run: pod install

      # ── Signing setup ─────────────────────────────────────────────────────────

      - name: Check signing secrets
        id: signing
        env:
          CERTIFICATE_B64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        run: |
          if [ -n "$CERTIFICATE_B64" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      # Creates a temporary keychain, imports the P12 certificate into it, and
      # installs the provisioning profile — standard pattern for CI signing.
      - name: Setup code signing
        if: steps.signing.outputs.available == 'true'
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 12)

          # Create and configure a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Decode and import distribution certificate
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          # Allow codesign to access the key without prompting
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and install provisioning profile; use its UUID as filename
          # (Xcode locates profiles by UUID, not by filename)
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          PP_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision

      # ── Xcode workspace / scheme detection ───────────────────────────────────

      - name: Detect Xcode workspace and scheme
        id: xcode
        working-directory: mobile/ios
        run: |
          WORKSPACE=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "ERROR: No .xcworkspace found in mobile/ios/" >&2
            exit 1
          fi
          SCHEME="${WORKSPACE%.xcworkspace}"
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME"       >> $GITHUB_OUTPUT
          echo "Detected workspace: $WORKSPACE  scheme: $SCHEME"

      # ── Signed build (archive → IPA) ─────────────────────────────────────────

      - name: Archive (signed release)
        if: steps.signing.outputs.available == 'true'
        working-directory: mobile/ios
        run: |
          xcodebuild archive \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme    "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE_UUID }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

      - name: Export IPA
        if: steps.signing.outputs.available == 'true'
        run: |
          TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"

          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath        "$RUNNER_TEMP/app.xcarchive" \
            -exportPath         "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      # ── Upload to TestFlight (push to main only) ──────────────────────────────

      - name: Upload to TestFlight
        if: >
          steps.signing.outputs.available == 'true' &&
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/ipa" -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No .ipa found in $RUNNER_TEMP/ipa" >&2
            exit 1
          fi
          echo "Uploading $IPA_PATH to TestFlight..."
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --username "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      # ── Unsigned simulator build (fallback when secrets are absent) ───────────

      - name: Build for simulator (unsigned)
        if: steps.signing.outputs.available == 'false'
        working-directory: mobile/ios
        run: |
          echo "::warning::Signing secrets not configured — building for simulator only (no IPA produced)"
          xcodebuild build \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme    "${{ steps.xcode.outputs.scheme }}" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES

      # ── Artifact upload ───────────────────────────────────────────────────────

      - name: Upload IPA artifact
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tibia-ot-monitor-ios-${{ github.run_number }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 14

      - name: Upload simulator build artifact
        if: steps.signing.outputs.available == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: tibia-ot-monitor-ios-simulator-${{ github.run_number }}
          path: ${{ runner.temp }}/DerivedData/Build/Products/Debug-iphonesimulator/*.app
          retention-days: 14
