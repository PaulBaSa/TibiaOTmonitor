name: Build Android APK

on:
  push:
    branches:
      - 'claude/**'
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    name: Build Android APK (release)
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # ── 1. Source ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Toolchain ──────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Placeholder assets (Expo requires icon/splash PNGs to exist) ───────
      - name: Create placeholder assets
        working-directory: mobile
        run: |
          mkdir -p assets
          python3 - <<'PYEOF'
          import struct, zlib

          def make_png(path, w, h, bg=(13, 13, 13)):
              """Create a minimal valid RGB PNG filled with bg color."""
              raw = b''.join(b'\x00' + bytes(bg) * w for _ in range(h))
              compressed = zlib.compress(raw)
              def chunk(tag, data):
                  body = tag + data
                  return struct.pack('>I', len(data)) + body + struct.pack('>I', zlib.crc32(body) & 0xffffffff)
              data = (
                  b'\x89PNG\r\n\x1a\n'
                  + chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
                  + chunk(b'IDAT', compressed)
                  + chunk(b'IEND', b'')
              )
              with open(path, 'wb') as f:
                  f.write(data)
              print(f'  Created {path} ({w}x{h})')

          make_png('assets/icon.png',           1024, 1024)
          make_png('assets/adaptive-icon.png',  1024, 1024)
          make_png('assets/splash.png',         1242, 2688)
          make_png('assets/favicon.png',          48,   48)
          print('Assets ready.')
          PYEOF

      # ── 4. JS dependencies ────────────────────────────────────────────────────
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: node-modules-${{ hashFiles('mobile/package.json') }}
          restore-keys: node-modules-

      - name: Install JS dependencies
        working-directory: mobile
        run: npm install

      # ── 5. Expo Prebuild — generates the native Android project ───────────────
      - name: Expo prebuild (generate Android native project)
        working-directory: mobile
        env:
          CI: '1'
          EXPO_NO_TELEMETRY: '1'
        run: npx expo prebuild --platform android --no-install

      # ── 6. Gradle build ───────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK (unsigned)
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── 7. Print APK info ─────────────────────────────────────────────────────
      - name: APK summary
        run: |
          DEBUG_PATH="mobile/android/app/build/outputs/apk/debug/app-debug.apk"
          RELEASE_PATH="mobile/android/app/build/outputs/apk/release/app-release.apk"
          for APK in "$DEBUG_PATH" "$RELEASE_PATH"; do
            if [ -f "$APK" ]; then
              SIZE=$(du -sh "$APK" | cut -f1)
              echo "✅ $(basename $APK) — ${SIZE}"
            else
              echo "❌ Not found: $APK"
              exit 1
            fi
          done

      # ── 8. Upload artifacts ───────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tibia-monitor-debug-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: tibia-monitor-release-unsigned-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
