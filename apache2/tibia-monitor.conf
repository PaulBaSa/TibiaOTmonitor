# Apache2 reverse-proxy config for Tibia Monitor Backend
#
# REQUIRED MODULES (enable once, then reload apache2):
#   sudo a2enmod ssl proxy proxy_http proxy_wstunnel rewrite headers
#   sudo systemctl reload apache2
#
# INSTALL:
#   sudo cp tibia-monitor.conf /etc/apache2/sites-available/tibia-monitor.conf
#   sudo a2ensite tibia-monitor
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# REQUIREMENTS:
#   - certbot already ran for your domain:
#       sudo certbot --apache -d your-domain.com
#   - Node backend running on localhost:3000 (npm start in /root/TibiaOTmonitor/backend)

# Replace every occurrence of "your-domain.com" with your actual domain.

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName your-domain.com

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# ── HTTPS — SSL termination + proxy to Node backend ──────────────────────────
<VirtualHost *:443>
    ServerName your-domain.com

    # Certbot-managed certificates
    SSLEngine On
    SSLCertificateFile      /etc/letsencrypt/live/your-domain.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/your-domain.com/privkey.pem
    # certbot --apache writes an options-ssl-apache.conf; include it if present:
    # Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On

    # Socket.IO WebSocket upgrade (must come before the catch-all ProxyPass)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/socket.io/(.*)$ ws://127.0.0.1:3000/socket.io/$1 [P,L]

    # REST API + everything else → Node backend
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Forward the real client IP to Node
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For   "%{REMOTE_ADDR}s"
</VirtualHost>
